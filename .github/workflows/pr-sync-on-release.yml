name: pr-sync-on-release

# When a version bump lands on main, bring every open PR back in sync so the
# release never leaves the others un-mergeable (product#3852).
#
# This repo bumps @leadbay/mcp inline in feature PRs (package.json + server.json
# + CHANGELOG.md), so whichever PR merges first claims the version number and the
# rest collide on those exact files. This workflow reconciles each open PR:
#
#   - Case A — PR does NOT touch the version files: merge main in and push, so
#     CI + the diff stay fresh. (main has no "must be up to date" gate, so these
#     already merge cleanly; this is a freshness nicety.)
#   - Case B — PR DOES touch the version files and now conflicts:
#       * conflict is only package.json / server.json → deterministically
#         renumber the PR to the next patch above main's version (both files),
#         keeping the server-json-version audit green, commit + push.
#       * conflict includes CHANGELOG.md → never auto-edit prose. Label
#         `needs-manual-rebase` + comment the target version for a human.
#
# Codex (the external chatgpt-codex-connector review bot) CANNOT do this — it
# only comments and cannot push to a branch. This workflow owns version sync;
# AGENTS.md points the reviewer here.
#
# Anti-loop: a push to a PR head made with GITHUB_TOKEN does NOT re-trigger
# ci.yml's pull_request/push runs (GitHub suppresses GITHUB_TOKEN-triggered
# runs — the same rule auto-tag.yml relies on). So there is no runaway loop.
# Because of that suppression the synced head would carry no fresh CI result, so
# after each push we explicitly `gh workflow run ci.yml --ref <head>` (ci.yml has
# a workflow_dispatch entry that checks out the requested ref). That dispatched
# run reports under the branch rather than as a PR check — fine here, since main
# has no required status checks; it's re-verification, not a merge gate.
#
# Security: the job checks out PR-head branches while holding a contents:write
# token, so it must NEVER execute code or config from a PR branch. It only does
# git plumbing (merge, checkout, commit, push) and reads the two version files
# as DATA via node scripts that are sourced from this workflow (trusted, from
# main). There is deliberately no `pnpm install`, no test runner, and no build
# step over branch content — the version-consistency check is reimplemented here
# as a pure JSON comparison (audit_version_files).

on:
  push:
    branches: [main]
    paths:
      - "packages/mcp/package.json"
      - "packages/mcp/server.json"
      - "packages/mcp/CHANGELOG.md"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log actions without pushing / labeling / commenting"
        type: boolean
        default: true

permissions:
  contents: write # push to PR head branches
  pull-requests: write # list, label, comment
  actions: write # dispatch ci.yml against the synced head (GITHUB_TOKEN pushes don't auto-fire it)

concurrency:
  # One reconciliation pass at a time; never cancel a pass mid-flight (it may be
  # partway through pushing to a branch).
  group: pr-sync-on-release
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Reconcile open PRs with main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # push (default true) is the mutating counterpart to dispatch dry_run.
          # A real push-to-main event has no inputs, so default to acting.
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          REPO: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          LABEL="needs-manual-rebase"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          MAIN_VER=$(node -p "require('./packages/mcp/package.json').version")
          # Next patch above main's version, e.g. 0.23.13 -> 0.23.14. A patch bump
          # never crosses a minor line, so the @leadbay/mcp@<major.minor> npx pins
          # in server.json stay correct and the version audit passes untouched.
          # shellcheck disable=SC2016  # single-quoted JS is intentional — $ must reach node, not bash
          NEXT=$(node -e 'const [a,b,c]=process.argv[1].split(".").map(Number);console.log(`${a}.${b}.${c+1}`)' "$MAIN_VER")
          echo "main @leadbay/mcp version: $MAIN_VER  → collision target: $NEXT"
          echo "DRY_RUN=$DRY_RUN"

          # Ensure the label exists before we try to apply it (idempotent).
          if [ "$DRY_RUN" != "true" ]; then
            gh label create "$LABEL" \
              --repo "$REPO" \
              --color "fbca04" \
              --description "PR conflicts with a version bump on main — needs a manual rebase" \
              2>/dev/null || true
          fi

          # --- helpers -----------------------------------------------------------
          # flag: this PR needs a human — apply the label + a factual comment.
          flag() { # $1=PR number  $2=comment body
            local n="$1" body="$2"
            echo "  → FLAG #$n: $body"
            if [ "$DRY_RUN" != "true" ]; then
              gh pr edit "$n" --repo "$REPO" --add-label "$LABEL" || true
              gh pr comment "$n" --repo "$REPO" --body "$body" || true
            fi
          }
          # clear_label: drop a stale needs-manual-rebase label. Safe/idempotent —
          # call on every success or no-op path so a PR the bot (or author) has
          # since made current never stays marked as needing a manual rebase.
          clear_label() { # $1=PR number
            local n="$1"
            if [ "$DRY_RUN" != "true" ]; then
              gh pr edit "$n" --repo "$REPO" --remove-label "$LABEL" 2>/dev/null || true
            fi
          }
          # note: PR was auto-fixed — comment only, and clear any stale label.
          note() { # $1=PR number  $2=comment body
            local n="$1" body="$2"
            echo "  → NOTE #$n: $body"
            if [ "$DRY_RUN" != "true" ]; then
              gh pr comment "$n" --repo "$REPO" --body "$body" || true
            fi
            clear_label "$n"
          }
          push_head() { # $1=PR number  $2=head ref
            local n="$1" head="$2"
            echo "  → PUSH #$n $head"
            if [ "$DRY_RUN" != "true" ]; then
              git push origin "HEAD:${head}"
              # A GITHUB_TOKEN push does NOT fire ci.yml's pull_request trigger, so
              # the synced head would otherwise carry no fresh build/test result.
              # Dispatch ci.yml to re-verify it. Dispatch from the DEFAULT branch's
              # copy of ci.yml (--ref main — that's where the workflow_dispatch
              # entry lives) and pass the head as the `ref` input so it builds the
              # branch we just updated. (Runs under the branch, not as a PR check —
              # main has no required checks, so this is verification, not a gate.)
              gh workflow run ci.yml --repo "$REPO" --ref main -f "ref=$head" \
                && echo "  → dispatched ci.yml for $head" \
                || echo "  → WARN: could not dispatch ci.yml for $head"
            fi
            # A successfully pushed head is current — drop any stale flag. (Callers
            # that still need the label, e.g. the stale-CHANGELOG case, re-add it
            # via flag() right after.)
            clear_label "$n"
          }
          # version_diff_only: true if $1 (a package.json or server.json) differs
          # from main ONLY in version-related fields — i.e. it is safe to renumber
          # without discarding legitimate PR edits. Runs a trusted, data-only node
          # script (from the workflow, checked out from main). It NEVER executes
          # code from the PR branch: it reads the two file blobs as data and
          # compares them field-by-field after neutralising the version.
          #   $1 = repo-relative path to a candidate version file
          #   $2 = git ref to compare against (origin/main)
          # Reads the PR-side blob from the working tree, the main-side via `git show`.
          version_diff_only() {
            local path="$1" ref="$2" mainblob
            mainblob=$(git show "${ref}:${path}") || return 1
            # shellcheck disable=SC2016  # single-quoted JS is intentional — args reach node, not bash
            MAIN_JSON="$mainblob" node -e '
              const fs = require("fs");
              const path = process.argv[1];
              // Parse both as pure data. A parse error (e.g. leftover conflict
              // markers) means "not safe to auto-renumber" → exit non-zero.
              let cur, main;
              try {
                cur  = JSON.parse(fs.readFileSync(path, "utf8"));
                main = JSON.parse(process.env.MAIN_JSON);
              } catch { process.exit(2); }
              // Neutralise every version field on both, then compare the rest.
              const strip = (o) => {
                const c = JSON.parse(JSON.stringify(o));
                if ("version" in c) c.version = "0";
                for (const p of (c.packages || [])) {
                  if ("version" in p) p.version = "0";
                  // npx pins carry the major.minor line; neutralise them too so a
                  // legitimate pin bump on a minor crossing is not seen as a
                  // non-version change (we only auto-handle patch bumps anyway).
                  for (const a of (p.runtimeArguments || [])) {
                    if (typeof a.value === "string") a.value = a.value.replace(/@leadbay\/mcp@\d+\.\d+/g, "@leadbay/mcp@X");
                  }
                  for (const e of (p.environmentVariables || [])) {
                    if (typeof e.description === "string") e.description = e.description.replace(/@leadbay\/mcp@\d+\.\d+/g, "@leadbay/mcp@X");
                  }
                }
                return JSON.stringify(c);
              };
              process.exit(strip(cur) === strip(main) ? 0 : 1);
            ' "$path"
          }

          # audit_version_files: reimplements packages/mcp/test/audit/
          # server-json-version.test.ts as a DATA-ONLY check — no pnpm install, no
          # vitest, so no PR-branch code runs. Returns non-zero if any invariant
          # fails. Operates on the working-tree files (post-renumber).
          audit_version_files() {
            # shellcheck disable=SC2016  # single-quoted JS is intentional
            node -e '
              const fs = require("fs");
              const pkg = JSON.parse(fs.readFileSync("packages/mcp/package.json", "utf8"));
              const raw = fs.readFileSync("packages/mcp/server.json", "utf8");
              const srv = JSON.parse(raw);
              const fail = (m) => { console.error("  audit: " + m); process.exit(1); };
              if (srv.version !== pkg.version) fail("server.version != package.version");
              if (srv.name !== pkg.mcpName) fail("server.name != package.mcpName");
              for (const p of (srv.packages || [])) if (p.version !== pkg.version) fail("packages[].version mismatch");
              const npmPkg = (srv.packages || []).find((p) => p.registryType === "npm");
              if (!npmPkg || npmPkg.identifier !== pkg.name) fail("npm package identifier mismatch");
              const [maj, min] = pkg.version.split(".");
              const line = maj + "." + min;
              const pins = [...raw.matchAll(/@leadbay\/mcp@(\d+\.\d+)/g)].map((m) => m[1]);
              if (pins.length === 0) fail("no npx pins found");
              for (const p of pins) if (p !== line) fail("pin " + p + " != " + line);
            '
          }

          # renumber the two JSON files to $NEXT IN PLACE on the merged working
          # tree (preserving any non-version PR edits), gate on a data-only audit,
          # then push + note. Refuses (returns 2) when a version file carries
          # non-version changes vs main, so legitimate edits are never dropped.
          # Assumes the merge is already complete/committed on HEAD (clean path)
          # OR the version files parse as clean JSON (no conflict markers).
          # $1=PR number  $2=head ref
          renumber_and_push() {
            local n="$1" head="$2"
            # Guard (Finding 1): only proceed if the version files differ from main
            # solely in version fields. Otherwise the PR has real edits here and we
            # must not touch it — hand to a human.
            if ! version_diff_only packages/mcp/package.json origin/main \
               || ! version_diff_only packages/mcp/server.json origin/main; then
              echo "  version files carry non-version changes — flagging, not renumbering"
              git merge --abort 2>/dev/null || git reset --hard "origin/$head"
              flag "$n" "main shipped \`$MAIN_VER\`. This PR changes \`package.json\`/\`server.json\` beyond the version, so the sync bot won't touch them — renumber to \`$NEXT\` and rebase manually."
              return 2
            fi

            echo "  → renumber package.json + server.json to $NEXT (in place)"
            # Edit ONLY the version fields on the merged tree — this keeps every
            # other field the PR set. (Safe: we proved above these files differ
            # from main only in version fields.)
            # shellcheck disable=SC2016  # single-quoted JS is intentional
            node -e '
              const fs = require("fs");
              const next = process.argv[1];
              for (const path of ["packages/mcp/package.json", "packages/mcp/server.json"]) {
                const o = JSON.parse(fs.readFileSync(path, "utf8"));
                if ("version" in o) o.version = next;
                for (const p of (o.packages || [])) if ("version" in p) p.version = next;
                fs.writeFileSync(path, JSON.stringify(o, null, 2) + "\n");
              }
            ' "$NEXT"
            git add packages/mcp/package.json packages/mcp/server.json
            if [ -f .git/MERGE_HEAD ]; then
              git commit --no-edit
            else
              # Clean-collision path: merge already committed. Fold the renumber in.
              git commit --amend --no-edit
            fi
            # Gate: DATA-ONLY audit (Finding 2 — no pnpm install / vitest, so no
            # PR-branch code executes under the write-scoped token).
            if ! audit_version_files; then
              echo "  !! version audit failed after renumber — aborting this PR" >&2
              git reset --hard "origin/$head"
              flag "$n" "main shipped \`$MAIN_VER\`. Auto-renumber to \`$NEXT\` failed the version audit — please rebase manually."
              return 1
            fi
            push_head "$n" "$head"
            # P2: we bumped package.json/server.json to $NEXT but never touch
            # CHANGELOG prose. If the PR carried its own changelog entry, its
            # header still reads ## <old> (e.g. $MAIN_VER) — on merge, release.yml
            # extracts notes from "## $NEXT" and, finding none, falls back to
            # generic notes, silently dropping the PR's real notes. So if the PR's
            # own range touched CHANGELOG.md AND the file has no "## $NEXT" section,
            # KEEP the manual-rebase label + tell the author to fix the header.
            local mb2 chl_touched=false
            mb2=$(git merge-base origin/main HEAD)
            if git diff --name-only "$mb2" HEAD -- packages/mcp/CHANGELOG.md | grep -q .; then
              chl_touched=true
            fi
            if [ "$chl_touched" = "true" ] && ! grep -qE "^## +${NEXT//./\\.}( |$)" packages/mcp/CHANGELOG.md; then
              echo "  changelog touched but has no '## $NEXT' header — flagging"
              flag "$n" "Synced with main and renumbered @leadbay/mcp to \`$NEXT\`, but your \`CHANGELOG.md\` still heads its section with the old version. Re-title it \`## $NEXT\` (release.yml pulls notes from \`## $NEXT\`) — otherwise the release ships generic notes."
            else
              note "$n" "Synced with main and renumbered @leadbay/mcp to \`$NEXT\` (main shipped \`$MAIN_VER\`)."
            fi
            return 0
          }
          # branch_ver: the @leadbay/mcp version on the current working tree.
          branch_ver() { node -p "require('./packages/mcp/package.json').version"; }
          # -----------------------------------------------------------------------

          # Enumerate open PRs (drafts included — this repo lives in drafts).
          # NB: we deliberately do NOT request `files` here — GitHub's file list is
          # computed against the current base and is unreliable once main moves
          # (see touches_ver below). Version-touch is derived from the branch range.
          prs=$(gh pr list --repo "$REPO" --state open --limit 100 \
                  --json number,headRefName,headRepositoryOwner)

          count=$(echo "$prs" | jq 'length')
          echo "Open PRs: $count"
          [ "$count" -eq 0 ] && { echo "Nothing to reconcile."; exit 0; }

          echo "$prs" | jq -c '.[]' | while read -r pr; do
            N=$(echo "$pr"     | jq -r '.number')
            HEAD=$(echo "$pr"  | jq -r '.headRefName')
            OWNER=$(echo "$pr" | jq -r '.headRepositoryOwner.login')
            echo "── PR #$N ($HEAD) ──────────────────────────────────────"

            # Fork guard: GITHUB_TOKEN can't push to a fork's head branch.
            if [ "$OWNER" != "$REPO_OWNER" ]; then
              flag "$N" "This PR is from a fork (\`$OWNER\`); the sync bot can't push to it. main shipped \`$MAIN_VER\` — please rebase on main manually."
              continue
            fi

            # Fresh checkout of the PR head.
            git fetch origin "$HEAD" -q
            git checkout -q -B "$HEAD" "origin/$HEAD"

            # Already contains main? Nothing to do — but clear any stale flag: the
            # branch is current, so a prior needs-manual-rebase no longer applies.
            if git merge-base --is-ancestor origin/main HEAD; then
              echo "  already up to date with main — skip"
              clear_label "$N"
              continue
            fi

            # Does the PR itself touch any of the three version files?
            # Derive this from the PR's OWN commit range (merge-base..HEAD), NOT
            # from `gh pr list --files`. GitHub computes .files against the CURRENT
            # base, so once main ships the same version the PR already set, the
            # version files become identical to main and GitHub DROPS them from the
            # list — touches_ver would wrongly read false and the branch would skip
            # renumbering, merging with no version delta so auto-tag never releases
            # it. The branch-range diff is immune to main moving.
            mb=$(git merge-base origin/main HEAD)
            if git diff --name-only "$mb" HEAD -- \
                 packages/mcp/package.json packages/mcp/server.json packages/mcp/CHANGELOG.md \
               | grep -q .; then
              touches_ver=true
            else
              touches_ver=false
            fi
            echo "  touches_ver=$touches_ver (from branch range ${mb:0:7}..HEAD)"

            if git merge --no-edit origin/main >/dev/null 2>&1; then
              # Clean merge. Two sub-cases when the PR touches the version files:
              # if it bumped to the SAME number main just shipped, git merges
              # without a conflict but the branch now equals main's version — on
              # merge, auto-tag.yml sees no version change and never releases.
              # Renumber above main so the PR's work still ships.
              if [ "$touches_ver" = "true" ] && [ "$(branch_ver)" = "$MAIN_VER" ]; then
                echo "  clean merge but version == main ($MAIN_VER) — renumbering"
                renumber_and_push "$N" "$HEAD" || true
              else
                # Case A, or a Case B whose version already differs from main.
                push_head "$N" "$HEAD"
              fi
              continue
            fi

            # Merge stopped on conflict — inspect what conflicted.
            conflicts=$(git diff --name-only --diff-filter=U || true)
            echo "  conflicts:"
            printf '%s\n' "$conflicts" | while IFS= read -r f; do echo "    $f"; done

            if [ "$touches_ver" != "true" ]; then
              # Case A with a real (non-version) code conflict — human's job.
              git merge --abort
              flag "$N" "Couldn't auto-sync with main — this PR has a merge conflict outside the version files. main shipped \`$MAIN_VER\`; please rebase manually."
              continue
            fi

            # Case B. If CHANGELOG is among the conflicts, don't touch prose.
            if echo "$conflicts" | grep -q '^packages/mcp/CHANGELOG\.md$'; then
              git merge --abort
              flag "$N" "main shipped \`$MAIN_VER\`. Renumber this PR to \`$NEXT\` (package.json + server.json) and re-anchor your CHANGELOG section above main's, then push. The sync bot won't edit CHANGELOG prose."
              continue
            fi

            # Only package.json / server.json conflict → deterministic renumber.
            only_json=$(echo "$conflicts" | grep -vE '^packages/mcp/(package|server)\.json$' || true)
            if [ -n "$only_json" ]; then
              # Some other file also conflicts alongside the JSON — don't guess.
              git merge --abort
              flag "$N" "main shipped \`$MAIN_VER\`. This PR conflicts on the version files AND other files; renumber to \`$NEXT\` and rebase manually."
              continue
            fi

            # Only package.json / server.json conflict → deterministic renumber.
            # Resolve the conflict markers by taking the PR's OWN version files
            # (origin/$HEAD — the PR's legitimate content, no markers), NOT main's,
            # so any non-version edits the PR made survive. renumber_and_push then
            # verifies those files differ from main only by version (else it flags
            # + aborts) and bumps only the version fields in place.
            git checkout "origin/$HEAD" -- packages/mcp/package.json packages/mcp/server.json
            git add packages/mcp/package.json packages/mcp/server.json
            renumber_and_push "$N" "$HEAD" || true
          done

          echo "Reconciliation pass complete."
