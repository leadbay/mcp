name: ci

on:
  pull_request:
  push:
    branches: [main]
  # Allow other workflows (pr-sync-on-release.yml) to request a run against a
  # specific ref. A GITHUB_TOKEN push to a PR head does NOT fire the
  # pull_request trigger above, so the sync bot dispatches this to produce a
  # fresh build/typecheck/test result on the head it just updated.
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/SHA) to build; defaults to the dispatch ref"
        required: false
        type: string

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # For a dispatched run, build the requested ref (the synced PR head);
          # for pull_request/push this input is empty so checkout uses its default.
          ref: ${{ github.event.inputs.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Unit tests
        run: pnpm -r test
        # Smoke tests are NOT run here — they require a live LEADBAY_TEST_TOKEN
        # against a dedicated tenant. Run them manually or in a separate
        # nightly workflow with the secret bound.

      - name: Verify @leadbay/mcp tarball is publishable
        working-directory: packages/mcp
        run: npm pack --dry-run

