name: build-image

# Build the Leadbay MCP HTTP-server Docker image and push it to Azure
# Container Registry (ACR), so the self-hosted k3s deployment in leadbay/infra
# can run it. The image is tagged with the full commit SHA — Argo CD Image
# Updater in the infra repo watches for the newest 40-char-SHA tag and bumps
# the workload's kustomization automatically (see infra
# apps/eu/_apps/mcp-updater.yaml).
#
# Runs independently of release.yml (npm publish + Fly deploy). Triggers on the
# same release tags so a published version always has a matching ACR image, and
# can be dispatched manually.
#
# One-time setup (repo settings → Secrets and variables → Actions):
#   - ACR_LOGIN_SERVER  → e.g. "leadbay.azurecr.io"
#   - ACR_USERNAME      → ACR token / service-principal id with push (AcrPush)
#   - ACR_PASSWORD      → its password / secret
# (A service principal scoped to AcrPush on the 'leadbay' registry is the
#  recommended credential; an ACR scope-map token also works.)

on:
  push:
    tags:
      - "mcp-v*.*.*"
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to build"
        required: false
        default: ""

concurrency:
  # Never let two builds push competing tags for the same commit concurrently.
  group: build-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    name: Build + push MCP image to ACR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Resolve image tags
        id: tags
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          SERVER="${{ secrets.ACR_LOGIN_SERVER }}"
          # Full 40-char commit SHA — the tag format Argo CD Image Updater
          # matches (regexp:^[0-9a-f]{40}$). Also push :latest for humans.
          echo "sha_tag=${SERVER}/mcp:${SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${SERVER}/mcp:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Build context is the repo root (the Dockerfile expects the monorepo).
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Pushed:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.tags.outputs.sha_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.tags.outputs.latest_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Argo CD Image Updater (leadbay/infra) will bump the mcp workload to the SHA tag." >> "$GITHUB_STEP_SUMMARY"
