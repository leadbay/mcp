app = 'leadbay-mcp-prod'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[env]
  LEADBAY_MCP_WRITE = '0'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
