<!--
  AGENT-GENERATED FIXTURE — do not hand-edit.
  Produced by an independent Claude subagent given ONLY the leadbay_artifact_kit
  usage guide (view-model API) + "build a call sheet with a campaign picker
  populated from my Leadbay campaigns". Evidence that an agent can leverage the
  view-model kit, including populate-from-API. agent-dogfood.test.ts injects the
  real runtime at the runtime-marker comment, stubs the bridge, and asserts the
  campaign dropdown populates from the API and the actions fire correct args.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Call Sheet — Acme Robotics &amp; Globex Pumps</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1d212a;
    --border: #2a2f3a;
    --border-strong: #3a4150;
    --text: #e6e9ef;
    --muted: #9aa3b2;
    --accent: #6ea8fe;
    --accent-strong: #4f8cff;
    --good: #46c08a;
    --good-bg: #16271f;
    --bad: #e0607a;
    --bad-bg: #2a1820;
    --warn: #e0b15f;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.25);
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 24px 16px 64px;
  }
  .sheet { max-width: 860px; margin: 0 auto; }

  header.page-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
  }
  header.page-head h1 {
    font-size: 20px;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  header.page-head p { margin: 0; color: var(--muted); font-size: 13px; }

  /* Shared campaign picker bar */
  .campaign-bar {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 22px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .campaign-bar label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 600;
  }
  .campaign-bar .picker-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .hint { font-size: 12px; color: var(--muted); }
  .hint.err { color: var(--bad); }

  select, input[type="text"], textarea {
    width: 100%;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 9px 11px;
    font: inherit;
    outline: none;
    transition: border-color .15s, box-shadow .15s, opacity .15s;
  }
  select:focus, input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,140,255,.18);
  }
  textarea { resize: vertical; min-height: 40px; }

  /* Lead cards */
  .lead-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 18px;
    overflow: hidden;
  }
  .lead-card > .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255,255,255,.02), transparent);
  }
  .lead-card .lead-name { font-size: 16px; font-weight: 650; }
  .lead-card .lead-id { font-size: 11px; color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

  .rate { display: flex; gap: 8px; }
  .rate button {
    background: var(--panel-2);
    border: 1px solid var(--border-strong);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 11px;
    font-size: 15px;
    cursor: pointer;
    line-height: 1;
    transition: transform .08s, background .15s, border-color .15s;
  }
  .rate button:hover { background: #232833; }
  .rate button:active { transform: scale(.93); }
  .rate button.like[data-lb-state="success"]  { background: var(--good-bg); border-color: var(--good); }
  .rate button.dislike[data-lb-state="success"]{ background: var(--bad-bg);  border-color: var(--bad);  }

  .card-body { padding: 16px; display: grid; gap: 14px; }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-group label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 600;
  }

  .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 2px; }
  .btn {
    appearance: none;
    border: 1px solid var(--border-strong);
    background: var(--panel-2);
    color: var(--text);
    border-radius: 9px;
    padding: 9px 15px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, border-color .15s, opacity .15s, transform .08s;
  }
  .btn:hover { background: #232833; }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: var(--accent-strong); border-color: var(--accent-strong); color: #fff; }
  .btn.primary:hover { background: #5f97ff; }
  .btn:disabled, .btn[aria-disabled="true"] { opacity: .55; cursor: not-allowed; }

  .status-line { font-size: 12.5px; min-height: 17px; color: var(--muted); }
  .status-line.ok  { color: var(--good); }
  .status-line.err { color: var(--bad); }

  /* ---- data-lb-state styling hooks (set by bind helpers on bound els) ---- */
  [data-lb-state="loading"] {
    opacity: .65;
    background-image: linear-gradient(90deg, transparent, rgba(255,255,255,.05), transparent);
    background-size: 200% 100%;
    animation: lb-shimmer 1.1s linear infinite;
  }
  @keyframes lb-shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

  [data-lb-state="error"] {
    border-color: var(--bad) !important;
    box-shadow: 0 0 0 2px rgba(224,96,122,.18);
  }
  [data-lb-state="error"]::after { content: ""; }

  [data-lb-state="success"] { border-color: var(--good); }

  [data-lb-state="unavailable"] {
    opacity: .55;
    border-style: dashed !important;
    cursor: not-allowed;
  }
  /* When a bound button is disabled/unavailable, dim it */
  button[data-lb-state="loading"] { pointer-events: none; }
  button[data-lb-state="unavailable"] { pointer-events: none; }

  /* Show the bind-helper's data-lb-error as a tooltip-ish trailing note where we mirror it */
  .lb-err-note { color: var(--bad); font-size: 12px; }
  .lb-unavail-note { color: var(--warn); font-size: 12px; }
</style>
</head>
<body>
<div class="sheet">
  <header class="page-head">
    <div>
      <h1>Interactive Call Sheet</h1>
      <p>Two leads · file calls into a campaign, log dispositions, rate fit.</p>
    </div>
  </header>

  <!-- SHARED campaign picker — populated from leadbay_list_campaigns -->
  <div class="campaign-bar">
    <label for="campaign">File calls into campaign</label>
    <div class="picker-row">
      <select id="campaign" aria-label="Campaign">
        <option value="">Loading campaigns…</option>
      </select>
    </div>
    <div class="hint" id="campaign-hint">Pick the campaign these calls belong to. Used by both “Add to campaign” buttons.</div>
  </div>

  <!-- ===================== LEAD CARD: Acme Robotics ===================== -->
  <section class="lead-card" data-lead="11111111-1111-1111-1111-111111111111">
    <div class="card-head">
      <div>
        <div class="lead-name">Acme Robotics</div>
        <div class="lead-id">11111111-1111-1111-1111-111111111111</div>
      </div>
      <div class="rate">
        <button class="like"    type="button" title="Good fit (👍)" aria-label="Like Acme Robotics">👍</button>
        <button class="dislike" type="button" title="Poor fit (👎)" aria-label="Dislike Acme Robotics">👎</button>
      </div>
    </div>
    <div class="card-body">
      <div class="field-group">
        <label>Disposition</label>
        <select class="status" aria-label="Disposition for Acme Robotics">
          <option value="STILL_CHASING">Still chasing</option>
          <option value="COULD_NOT_REACH_STILL_TRYING">Couldn’t reach — still trying</option>
          <option value="INTEREST_VALIDATED_OR_MEETING_PLANED">Interested / meeting planned</option>
          <option value="NOT_INTERESTED_LOST">Not interested — lost</option>
        </select>
      </div>
      <div class="field-group">
        <label>Call note</label>
        <textarea class="note" rows="2" placeholder="What happened on the call? (required to log)"></textarea>
      </div>
      <div class="actions">
        <button class="btn add-campaign" type="button">Add to campaign</button>
        <button class="btn primary log-call" type="button">Log call</button>
      </div>
      <div class="status-line" data-role="status"></div>
    </div>
  </section>

  <!-- ===================== LEAD CARD: Globex Pumps ===================== -->
  <section class="lead-card" data-lead="22222222-2222-2222-2222-222222222222">
    <div class="card-head">
      <div>
        <div class="lead-name">Globex Pumps</div>
        <div class="lead-id">22222222-2222-2222-2222-222222222222</div>
      </div>
      <div class="rate">
        <button class="like"    type="button" title="Good fit (👍)" aria-label="Like Globex Pumps">👍</button>
        <button class="dislike" type="button" title="Poor fit (👎)" aria-label="Dislike Globex Pumps">👎</button>
      </div>
    </div>
    <div class="card-body">
      <div class="field-group">
        <label>Disposition</label>
        <select class="status" aria-label="Disposition for Globex Pumps">
          <option value="STILL_CHASING">Still chasing</option>
          <option value="COULD_NOT_REACH_STILL_TRYING">Couldn’t reach — still trying</option>
          <option value="INTEREST_VALIDATED_OR_MEETING_PLANED">Interested / meeting planned</option>
          <option value="NOT_INTERESTED_LOST">Not interested — lost</option>
        </select>
      </div>
      <div class="field-group">
        <label>Call note</label>
        <textarea class="note" rows="2" placeholder="What happened on the call? (required to log)"></textarea>
      </div>
      <div class="actions">
        <button class="btn add-campaign" type="button">Add to campaign</button>
        <button class="btn primary log-call" type="button">Log call</button>
      </div>
      <div class="status-line" data-role="status"></div>
    </div>
  </section>
</div>

<!-- RUNTIME_HERE -->

<script>
(function () {
  "use strict";

  var lb = window.LeadbayArtifacts;
  if (!lb) {
    document.querySelectorAll(".status-line").forEach(function (el) {
      el.className = "status-line err";
      el.textContent = "Leadbay runtime unavailable — controls are inert.";
    });
    var ch = document.getElementById("campaign-hint");
    if (ch) { ch.className = "hint err"; ch.textContent = "Leadbay runtime unavailable — campaigns can’t load."; }
    return;
  }
  if (typeof lb.configure === "function") lb.configure();

  // Verbatim user request — flows into _triggered_by / verification.ref.
  var ASK = "Build me an interactive call sheet for these two leads. I want a dropdown to pick which campaign I'm filing the call into (populated from my Leadbay campaigns), a disposition dropdown, a note field, an 'Add to campaign' button, a 'Log call' button, and 👍/👎 per lead.";

  /* ------------------------------------------------------------------ *
   * SHARED campaign field — populated from leadbay_list_campaigns.
   * Response shape: { campaigns: [{ campaign: {id, name, ...}, ... }] }.
   * Mapper is defensive: handles the nested `.campaign` shape and a
   * possible flat {id,name} shape, plus archived filtering.
   * ------------------------------------------------------------------ */
  var campaign = lb.field({
    kind: "select",
    load: function () { return lb.call("leadbay_list_campaigns", { _triggered_by: ASK }); },
    options: function (r) {
      var list = (r && r.campaigns) || [];
      return list
        .map(function (entry) {
          var c = entry && entry.campaign ? entry.campaign : entry;
          if (!c || !c.id) return null;
          if (c.archived) return null;
          var label = c.name || c.ai_generated_name || ("Campaign " + String(c.id).slice(0, 8));
          return { value: c.id, label: label };
        })
        .filter(Boolean);
    },
    validate: function (v) { return v ? null : "Pick a campaign first"; }
  });

  var campaignEl = document.getElementById("campaign");
  lb.bindSelect(campaignEl, campaign);

  var campaignHint = document.getElementById("campaign-hint");
  campaign.subscribe(function () {
    if (campaign.loading) {
      campaignHint.className = "hint";
      campaignHint.textContent = "Loading your campaigns…";
    } else if (campaign.error) {
      campaignHint.className = "hint err";
      campaignHint.textContent = campaign.error.unavailable
        ? "Leadbay runtime unavailable — campaigns can’t load."
        : ("Couldn’t load campaigns: " + (campaign.error.message || campaign.error));
    } else if (!campaign.options || campaign.options.length === 0) {
      campaignHint.className = "hint";
      campaignHint.textContent = "No active campaigns found. Create one in Leadbay, then reload.";
    } else {
      campaignHint.className = "hint";
      campaignHint.textContent = "Pick the campaign these calls belong to. Used by both “Add to campaign” buttons.";
    }
  });

  // Kick off the populate-from-API load.
  campaign.load();

  /* ------------------------------------------------------------------ *
   * Per-lead wiring.
   * ------------------------------------------------------------------ */
  function setStatus(card, kind, msg) {
    var el = card.querySelector('[data-role="status"]');
    if (!el) return;
    el.className = "status-line" + (kind ? " " + kind : "");
    el.textContent = msg || "";
  }

  document.querySelectorAll(".lead-card[data-lead]").forEach(function (card) {
    var LEAD = card.getAttribute("data-lead");

    // Disposition (no API populate — static enum options already in markup).
    var status = lb.field({ value: "STILL_CHASING" });
    lb.bindValue(card.querySelector(".status"), status);

    // Note — required for Log call.
    var note = lb.field({
      validate: function (v) { return v && v.trim() ? null : "Add a note before logging the call"; }
    });
    lb.bindValue(card.querySelector(".note"), note);

    // --- Add to campaign ---
    var addAction = lb.action({
      tool: "leadbay_add_leads_to_campaign",
      fields: [campaign],
      args: function () {
        return {
          campaign_id: campaign.value,
          lead_ids: [LEAD],
          _triggered_by: ASK
        };
      },
      onSuccess: function (res) {
        var added = res && typeof res.added === "number" ? res.added : null;
        var dup = res && typeof res.already_present === "number" ? res.already_present : null;
        var msg = "Added to campaign.";
        if (added !== null || dup !== null) {
          msg = (added || 0) + " added"
              + (dup ? ", " + dup + " already in campaign" : "") + ".";
        }
        setStatus(card, "ok", msg);
      },
      onError: function (err) {
        setStatus(card, "err",
          err && err.unavailable
            ? "Runtime unavailable — couldn’t add to campaign."
            : ("Add to campaign failed: " + ((err && err.message) || err) +
               (campaign.value ? "" : " (pick a campaign first)")));
      }
    });
    var addBtn = card.querySelector(".add-campaign");
    lb.bindAction(addBtn, addAction);

    // --- Log call (report_outreach) ---
    var logAction = lb.action({
      tool: "leadbay_report_outreach",
      fields: [note],
      args: function () {
        return {
          lead_id: LEAD,
          epilogue_status: status.value,
          note: note.value,
          verification: { source: "user_confirmed", ref: "Logged from interactive call sheet: " + ASK },
          _triggered_by: ASK
        };
      },
      onSuccess: function () {
        setStatus(card, "ok", "Call logged · disposition saved.");
        note.setValue("");
      },
      onError: function (err) {
        setStatus(card, "err",
          err && err.unavailable
            ? "Runtime unavailable — call not logged."
            : ("Log call failed: " + ((err && err.message) || err) +
               (note.value && note.value.trim() ? "" : " (add a note first)")));
      }
    });
    var logBtn = card.querySelector(".log-call");
    lb.bindAction(logBtn, logAction);

    // --- 👍 like ---
    var likeAction = lb.action({
      tool: "leadbay_like_lead",
      args: function () { return { lead_id: LEAD }; },
      onSuccess: function () { setStatus(card, "ok", "Marked as good fit 👍"); },
      onError: function (err) {
        setStatus(card, "err",
          err && err.unavailable ? "Runtime unavailable — rating not saved." : "Couldn’t save rating.");
      }
    });
    lb.bindAction(card.querySelector(".like"), likeAction);

    // --- 👎 dislike ---
    var dislikeAction = lb.action({
      tool: "leadbay_dislike_lead",
      args: function () { return { lead_id: LEAD }; },
      onSuccess: function () { setStatus(card, "ok", "Marked as poor fit 👎"); },
      onError: function (err) {
        setStatus(card, "err",
          err && err.unavailable ? "Runtime unavailable — rating not saved." : "Couldn’t save rating.");
      }
    });
    lb.bindAction(card.querySelector(".dislike"), dislikeAction);
  });
})();
</script>
</body>
</html>
